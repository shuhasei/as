<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#020711">
  <title>Hidden Crew 3D Pro</title>
  <link rel="stylesheet" href="/style.css?v=20260724-chat-1">
  <script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js"}}</script>
</head>
<body>
<div id="app">
  <section id="menu" class="screen menu-screen">
    <div class="menu-card glass">
      <p class="eyebrow">ONLINE SOCIAL DEDUCTION</p>
      <h1>HIDDEN CREW <span>3D PRO</span></h1>
      <p class="lead">宇宙研究施設に潜む侵入者を見つけ出そう。</p>
      <label class="field">プレイヤー名<input id="nameInput" maxlength="16" value="Player" autocomplete="nickname"></label>
      <div class="menu-grid">
        <button id="createButton" class="primary">新しい部屋を作る</button>
        <div class="join-row"><input id="roomInput" maxlength="6" placeholder="ROOM CODE"><button id="joinButton">参加</button></div>
      </div>
      <p id="menuMessage" class="message"></p>
      <div class="feature-chips"><span>3D</span><span>WebSocket</span><span>会議</span><span>タスク</span><span>妨害</span></div>
    </div>
  </section>

  <section id="gameScreen" class="screen hidden">
    <canvas id="gameCanvas"></canvas>
    <header id="topBar" class="glass">
      <div><b>ROOM</b> <button id="copyRoomButton" class="link-button"><span id="roomCode">------</span></button></div>
      <div id="roleText">役職：---</div><div id="statusText">ロビー</div>
      <button id="cameraButton" class="small">近い視点へ切替</button>
    </header>

    <aside id="playerPanel" class="glass panel">
      <div class="panel-title"><h2>PLAYERS</h2><span id="playerCount">0/10</span></div>
      <div id="playerList"></div>
      <button id="startButton" class="primary hidden">ゲーム開始</button>
      <button id="settingsButton" class="secondary hidden">ルール設定</button>
    </aside>

    <aside id="taskPanel" class="glass panel hidden">
      <div class="panel-title"><h2>TASKS</h2><span id="taskCounter">0/0</span></div>
      <div id="taskList"></div><div class="progress"><i id="taskProgress"></i></div>
    </aside>

    <aside id="sabotageBanner" class="sabotage-banner hidden"><strong id="sabotageTitle">緊急事態</strong><span id="sabotageTimer"></span></aside>
    <canvas id="miniMap" width="220" height="160"></canvas>

    <div id="actionBar" class="glass hidden">
      <button id="useButton">使用 <kbd>E</kbd></button>
      <button id="reportButton">通報 <kbd>R</kbd></button>
      <button id="killButton" class="danger hidden">攻撃 <span id="killCooldown"></span></button>
      <button id="sabotageButton" class="danger hidden">妨害</button>
      <button id="meetingButton">会議</button>
    </div>


    <aside id="globalChatPanel" class="glass chat-panel">
      <div class="chat-panel-header">
        <strong>CHAT</strong>
        <button id="chatToggleButton" class="small secondary" type="button">最小化</button>
      </div>
      <div id="globalChatLog" class="chat-log" aria-live="polite"></div>
      <form id="globalChatForm" class="chat-form">
        <input id="globalChatInput" maxlength="120" placeholder="いつでもチャットできます" autocomplete="off">
        <button type="submit">送信</button>
      </form>
    </aside>

    <div id="joystick" class="hidden"><div id="stick"></div></div>
    <div id="controlHint" class="glass">移動：WASD／矢印キー　使用：E　通報：R　視点：右上ボタン</div>
    <div id="notice"></div>
  </section>

  <dialog id="settingsDialog"><div class="dialog-card"><button class="close" data-close="settingsDialog">×</button><h2>ルール設定</h2>
    <div class="settings-grid">
      <label>侵入者<select id="settingImpostors"><option value="1">1人</option><option value="2">2人</option><option value="3">3人</option></select></label>
      <label>タスク数<select id="settingTasks"><option value="3">3</option><option value="4">4</option><option value="5">5</option></select></label>
      <label>移動速度<select id="settingSpeed"><option value="0.85">ゆっくり</option><option value="1" selected>標準</option><option value="1.2">速い</option></select></label>
      <label>攻撃待ち時間<select id="settingKillCooldown"><option value="10">10秒</option><option value="15" selected>15秒</option><option value="25">25秒</option><option value="35">35秒</option></select></label>
      <label>会議時間<select id="settingMeeting"><option value="30">30秒</option><option value="45" selected>45秒</option><option value="60">60秒</option></select></label>
      <label>役職表示<select id="settingReveal"><option value="yes">追放時に表示</option><option value="no">表示しない</option></select></label>
    </div><button id="saveSettingsButton" class="primary">保存</button></div></dialog>

  <dialog id="taskDialog"><div class="dialog-card"><button class="close" data-close="taskDialog">×</button><h2 id="taskTitle">TASK</h2><div id="taskGame"></div></div></dialog>
  <dialog id="sabotageDialog"><div class="dialog-card"><button class="close" data-close="sabotageDialog">×</button><h2>妨害を選択</h2><div class="sabotage-grid"><button data-sabotage="lights">照明停止</button><button data-sabotage="comms">通信妨害</button><button data-sabotage="doors">ドア封鎖</button><button data-sabotage="reactor" class="danger">リアクター暴走</button></div></div></dialog>
  <dialog id="meetingDialog"><div class="dialog-card meeting-card"><h2 id="meetingReason">緊急会議</h2><div class="meeting-columns"><section><h3>投票</h3><div id="voteList"></div><button id="skipVoteButton">スキップ</button><p id="meetingTimer"></p></section><section><div class="voice-header"><h3>通話・チャット</h3><button id="micButton" type="button">🎙 マイクON</button></div><p id="voiceStatus" class="voice-status">会議開始後に音声通話へ接続します。</p><div id="remoteAudio" aria-live="polite"></div><div id="meetingChatLog" class="chat-log"></div><form id="meetingChatForm" class="chat-form"><input id="meetingChatInput" maxlength="120" placeholder="会議チャット"><button>送信</button></form></section></div></div></dialog>
  <dialog id="resultDialog"><div class="dialog-card result-card"><h2 id="resultTitle">GAME OVER</h2><p id="resultText"></p><div id="resultPlayers"></div><button id="returnLobbyButton" class="primary">ロビーへ戻る</button></div></dialog>
</div>
<script type="module" src="/game.js?v=20260724-chat-1"></script>
</body>
</html>
