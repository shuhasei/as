<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Hidden Crew 3D</title>
  <link rel="stylesheet" href="/style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <section id="menu" class="screen card">
      <p class="eyebrow">ONLINE SOCIAL DEDUCTION</p>
      <h1>HIDDEN CREW <span>3D</span></h1>
      <p class="lead">宇宙施設に紛れた侵入者を見つけよう。</p>
      <label>プレイヤー名<input id="nameInput" maxlength="16" value="Player"></label>
      <div class="menu-grid">
        <button id="createButton" class="primary">部屋を作る</button>
        <div class="join-row"><input id="roomInput" maxlength="6" placeholder="ROOM CODE"><button id="joinButton">参加</button></div>
      </div>
      <p id="menuMessage" class="message"></p>
    </section>

    <section id="gameScreen" class="screen hidden">
      <canvas id="gameCanvas"></canvas>
      <header id="topBar" class="glass">
        <div><b>ROOM</b> <span id="roomCode">------</span></div>
        <div id="roleText">役職：---</div>
        <div id="statusText">ロビー</div>
      </header>

      <aside id="playerPanel" class="glass panel">
        <h2>PLAYERS</h2><div id="playerList"></div>
        <button id="startButton" class="primary hidden">ゲーム開始</button>
      </aside>

      <aside id="taskPanel" class="glass panel hidden">
        <h2>TASKS</h2><div id="taskList"></div>
        <div class="progress"><i id="taskProgress"></i></div>
      </aside>

      <div id="actionBar" class="glass hidden">
        <button id="useButton">使用</button>
        <button id="reportButton">通報</button>
        <button id="killButton" class="danger hidden">攻撃</button>
        <button id="sabotageButton" class="danger hidden">妨害</button>
        <button id="meetingButton">会議</button>
      </div>

      <div id="joystick" class="hidden"><div id="stick"></div></div>
      <div id="notice"></div>
    </section>

    <dialog id="taskDialog"><div class="dialog-card"><button class="close" data-close="taskDialog">×</button><h2 id="taskTitle">TASK</h2><div id="taskGame"></div></div></dialog>
    <dialog id="sabotageDialog"><div class="dialog-card"><button class="close" data-close="sabotageDialog">×</button><h2>妨害</h2><button data-sabotage="lights">照明を落とす</button><button data-sabotage="reactor" class="danger">リアクター暴走</button></div></dialog>
    <dialog id="meetingDialog"><div class="dialog-card meeting-card"><h2 id="meetingReason">緊急会議</h2><div id="chatLog"></div><form id="chatForm"><input id="chatInput" maxlength="120"><button>送信</button></form><h3>投票</h3><div id="voteList"></div><p id="meetingTimer"></p></div></dialog>
    <dialog id="resultDialog"><div class="dialog-card"><h2 id="resultTitle">GAME OVER</h2><p id="resultText"></p><button id="returnLobbyButton" class="primary">ロビーへ戻る</button></div></dialog>
  </div>
  <script type="module" src="/game.js"></script>
</body>
</html>
