<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Hidden Crew</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main>
    <section id="menu" class="panel">
      <h1>HIDDEN CREW</h1>
      <p>オリジナルのオンライン正体隠匿ゲーム</p>
      <input id="name" maxlength="14" placeholder="プレイヤー名" value="Player">
      <div class="row"><button id="create">部屋を作る</button></div>
      <div class="row"><input id="room" maxlength="6" placeholder="ルームコード"><button id="join">参加</button></div>
      <p id="status"></p>
    </section>

    <section id="lobby" class="panel hidden">
      <h2>ロビー <span id="roomLabel"></span></h2>
      <div id="lobbyPlayers"></div>
      <button id="start">ゲーム開始</button>
    </section>

    <section id="game" class="hidden">
      <header>
        <span id="role">役職: -</span>
        <span id="taskProgress">タスク: 0/0</span>
        <span id="sabotage"></span>
      </header>
      <canvas id="canvas" width="980" height="640"></canvas>
      <div class="actions">
        <button id="taskBtn">タスク</button>
        <button id="attackBtn">攻撃</button>
        <button id="reportBtn">通報</button>
        <button id="meetingBtn">緊急会議</button>
        <button id="sabotageBtn">妨害</button>
        <button id="fixBtn">妨害修理</button>
      </div>
      <p class="hint">PC: WASD / 矢印キー　スマホ: 画面下の方向ボタン</p>
      <div class="pad"><button data-dir="up">▲</button><div><button data-dir="left">◀</button><button data-dir="down">▼</button><button data-dir="right">▶</button></div></div>
    </section>

    <dialog id="taskDialog"><h3 id="taskTitle">タスク</h3><p>表示された数字を順番に押してください。</p><div id="taskNumbers"></div><button id="closeTask">閉じる</button></dialog>

    <section id="meeting" class="panel hidden">
      <h2>会議</h2><p id="meetingReason"></p>
      <div id="chat"></div>
      <div class="row"><input id="chatInput" maxlength="120"><button id="sendChat">送信</button></div>
      <div id="votes"></div><button data-vote="skip">スキップ</button>
    </section>

    <section id="result" class="panel hidden"><h2 id="resultTitle"></h2><p id="resultReason"></p><button id="rematch">ロビーへ戻る</button></section>
  </main>
  <script type="module" src="/game.js"></script>
</body>
</html>
